version: '3.8'

services:
  # 1. The Phonebook
  registry:
    build: ./service-registry
    ports:
      - "8761:8761"

  # 2. Journal Service
  journal-service:
    build: ./journal-service
    ports:
      - "8082:8082"
    environment:
      # This overrides the application.properties to point to the Docker registry!
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://registry:8761/eureka/
    depends_on:
      - registry

  # 3. Routine Service
  routine-service:
    build: ./routine-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://registry:8761/eureka/
    depends_on:
      - registry

  # 4. The Receptionist
  api-gateway:
    build: ./api-gateway
    ports:
      - "8084:8084"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://registry:8761/eureka/
    depends_on:
      - registry